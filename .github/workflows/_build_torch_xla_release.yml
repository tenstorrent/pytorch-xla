name: build-torch-xla-release
on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to build (e.g., 3.11, 3.12)'
        required: true
        type: string
      torch_version:
        description: 'Torch version to build (default: 2.9.0)'
        required: false
        type: string
        default: '2.9.0'
      xla_branch:
        description: 'PyTorch-XLA branch to build (default: master)'
        required: false
        type: string
        default: 'master'
    outputs:
      artifact_name:
        description: 'Name of uploaded wheels artifact'
        value: ${{ jobs.build-wheels.outputs.artifact_name }}
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to build (e.g., 3.11, 3.12)'
        required: true
        type: string
      torch_version:
        description: 'Torch version to build (default: 2.9.0)'
        required: false
        type: string
        default: '2.9.0'
      xla_branch:
        description: 'PyTorch-XLA branch to build (default: master)'
        required: false
        type: string
        default: 'master'
jobs:
  build-wheels:
    runs-on: ubuntu-latest
    timeout-minutes: 540
    env:
      ARTIFACT_NAME: install-artifact-torch-xla-release-${{ inputs.python_version }}
      GIT_VERSIONED_XLA_BUILD: 1
    container:
      image: us-central1-docker.pkg.dev/tpu-pytorch-releases/docker/development:tpu
      options: --user root
    outputs:
      artifact_name: ${{ steps.set_upload_name.outputs.artifact_name }}
    steps:
      - name: Maximize space
        shell: bash
        run: |
          # tenstorrent/tt-github-actions/.github/actions/maximize_space@main without sudo         
          echo "Disk usage before"
          echo "========================"
          df -h
          echo "Space used by toolchain"
          echo "-------------------------"
          du -h --max-depth=2 /opt || true
          echo "Space used by sw packages"
          echo "-------------------------"
          du -h --max-depth=2 /__t || true
          echo 
          # Remove sw packages
          if [ -d "/__t" ]; then
            rm -fr /__t/PyPy || true
            rm -fr /__t/node || true
            rm -fr /__t/CodeQL || true
            rm -fr /__t/Ruby || true
            rm -fr /__t/go || true
            rm -fr /__t/Python || true
          fi
          if [ -d "/opt/hostedtoolcache" ]; then
            rm -fr /opt/hostedtoolcache/PyPy || true
            rm -fr /opt/hostedtoolcache/node || true
            rm -fr /opt/hostedtoolcache/CodeQL || true
            rm -fr /opt/hostedtoolcache/Ruby || true
            rm -fr /opt/hostedtoolcache/go || true
            rm -fr /opt/google/chrome || true
            rm -fr /opt/microsoft || true
            rm -fr /opt/az || true
            rm -fr /opt/ghc || true
          fi
          echo "Disk usage after"
          echo "========================"
          df -h
      - name: "Build Torch/XLA wheel"
        shell: bash
        id: build_wheels
        run: |
          apt-get update && apt-get install -y curl git build-essential

          # Clean up any existing pyenv installation
          rm -rf $HOME/.pyenv

          curl https://pyenv.run | bash
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init -)"
          pyenv install ${{ inputs.python_version }}
          pyenv global ${{ inputs.python_version }}
          ln -sf $(pyenv which python${{ inputs.python_version }}) /usr/local/bin/python${{ inputs.python_version }}

          # Install essential packages for Python ${{ inputs.python_version }}
          python${{ inputs.python_version }} -m pip install --upgrade pip
          python${{ inputs.python_version }} -m pip install cmake pyyaml setuptools wheel numpy typing_extensions requests

          cd /tmp
          git clone --depth 1 --recursive --branch v${{ inputs.torch_version }} https://github.com/pytorch/pytorch.git
          cd pytorch/
          git clone --recursive --branch ${{ inputs.xla_branch || 'master' }} https://github.com/tenstorrent/pytorch-xla.git xla

          (
            # Build PyTorch
            # From https://docs.pytorch.org/FBGEMM/fbgemm/development/BuildInstructions.html, section "Build Issues with GCC 12+"
            export CFLAGS+="-w -Wno-error=maybe-uninitialized -Wno-error=uninitialized -Wno-error=restrict"
            export CXXFLAGS+="-w -Wno-error=maybe-uninitialized -Wno-error=uninitialized -Wno-error=restrict"
            # copy pre-built wheels from cache
            MAX_JOBS=8 BAZEL_JOBS=8 python${{ inputs.python_version }} setup.py bdist_wheel
            MAX_JOBS=8 BAZEL_JOBS=8 python${{ inputs.python_version }} setup.py develop

            rm -rf .git/
          )

          # Build PyTorch/XLA
          cd xla/
          MAX_JOBS=8 BAZEL_JOBS=8 python${{ inputs.python_version }} setup.py bdist_wheel

          # Collect wheels
          mkdir -p /dist
          cp dist/*.whl /dist/

          # Clean up any existing pyenv installation
          rm -rf $HOME/.pyenv

      - name: "Upload Wheels Artifact"
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /dist/*.whl
      
      - name: Set artifact name output
        id: set_upload_name
        run: echo "artifact_name=${{ env.ARTIFACT_NAME }}" >> $GITHUB_OUTPUT
